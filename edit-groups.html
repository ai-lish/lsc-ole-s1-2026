<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖊️ 編輯學生分組 - 靈風中學</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ECC71;
            --light: #ECF0F1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #2C3E50;
        }
        .header {
            background: linear-gradient(135deg, #4A90E2 0%, #00D2FF 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.8rem; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #4A90E2;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .class-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #ECF0F1;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .class-header h3 { color: #4A90E2; }
        .edit-btn, .save-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .edit-btn { background: #4A90E2; color: white; }
        .save-btn { background: #2ECC71; color: white; }
        .class-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .class-table th, .class-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .class-table th { background: #4A90E2; color: white; }
        .edit-mode { display: none; }
        .edit-mode.active { display: block; }
        .view-mode.hidden { display: none; }
        .edit-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }
        .edit-col { background: #ECF0F1; padding: 15px; border-radius: 10px; }
        .edit-col h4 { color: #4A90E2; margin-bottom: 10px; }
        .edit-col textarea {
            width: 100%;
            height: 180px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖊️ 編輯學生分組</h1>
        <a href="index.html" class="back-btn">🔙 返回首頁</a>
    </div>
    
    <div class="container">
        <!-- 1A -->
        <div class="class-section">
            <div class="class-header">
                <h3>📖 1A (33人)</h3>
                <button class="edit-btn" onclick="toggleEdit('1A')">🖊️ 編輯</button>
            </div>
            <div class="view-mode" id="view-1A">
                <table class="class-table">
                    <tr><th>組別</th><th>同學名單</th><th>負責老師</th></tr>
                    <tr><td>1</td><td class="student-cell" data-group="1A-1">待更新</td><td class="teacher-cell" data-group="1A-1-2" rowspan="2">待更新</td></tr>
                    <tr><td>2</td><td class="student-cell" data-group="1A-2"></td></tr>
                    <tr><td>3</td><td class="student-cell" data-group="1A-3"></td><td class="teacher-cell" data-group="1A-3-4" rowspan="2">待更新</td></tr>
                    <tr><td>4</td><td class="student-cell" data-group="1A-4"></td></tr>
                    <tr><td>5</td><td class="student-cell" data-group="1A-5"></td><td class="teacher-cell" data-group="1A-5-6" rowspan="2">待更新</td></tr>
                    <tr><td>6</td><td class="student-cell" data-group="1A-6"></td></tr>
                </table>
            </div>
            <div class="edit-mode" id="edit-1A">
                <div class="edit-container">
                    <div class="edit-col"><h4>👨‍🎓 學生名單</h4><textarea id="students-1A" placeholder="可由Excel貼上&#10;&#10;第1行: 第1組同學&#10;第2行: 第2組同學&#10;第3行: 第3組同學&#10;第4行: 第4組同學&#10;第5行: 第5組同學&#10;第6行: 第6組同學"></textarea></div>
                    <div class="edit-col"><h4>👩‍🏫 負責老師</h4><textarea id="teachers-1A" placeholder="可由Excel貼上&#10;&#10;第1行: 1-2組老師&#10;第2行: 3-4組老師&#10;第3行: 5-6組老師"></textarea></div>
                </div>
                <div style="text-align:center;margin-top:15px;"><button class="save-btn" onclick="saveEdit('1A')">💾 儲存</button></div>
            </div>
        </div>
        
        <!-- 1B -->
        <div class="class-section">
            <div class="class-header">
                <h3>📖 1B (32人)</h3>
                <button class="edit-btn" onclick="toggleEdit('1B')">🖊️ 編輯</button>
            </div>
            <div class="view-mode" id="view-1B">
                <table class="class-table">
                    <tr><th>組別</th><th>同學名單</th><th>負責老師</th></tr>
                    <tr><td>1</td><td class="student-cell" data-group="1B-1">待更新</td><td class="teacher-cell" data-group="1B-1-2" rowspan="2">待更新</td></tr>
                    <tr><td>2</td><td class="student-cell" data-group="1B-2"></td></tr>
                    <tr><td>3</td><td class="student-cell" data-group="1B-3"></td><td class="teacher-cell" data-group="1B-3-4" rowspan="2">待更新</td></tr>
                    <tr><td>4</td><td class="student-cell" data-group="1B-4"></td></tr>
                    <tr><td>5</td><td class="student-cell" data-group="1B-5"></td><td class="teacher-cell" data-group="1B-5-6" rowspan="2">待更新</td></tr>
                    <tr><td>6</td><td class="student-cell" data-group="1B-6"></td></tr>
                </table>
            </div>
            <div class="edit-mode" id="edit-1B">
                <div class="edit-container">
                    <div class="edit-col"><h4>👨‍🎓 學生名單</h4><textarea id="students-1B" placeholder="可由Excel貼上&#10;&#10;第1行: 第1組同學&#10;第2行: 第2組同學&#10;第3行: 第3組同學&#10;第4行: 第4組同學&#10;第5行: 第5組同學&#10;第6行: 第6組同學"></textarea></div>
                    <div class="edit-col"><h4>👩‍🏫 負責老師</h4><textarea id="teachers-1B" placeholder="可由Excel貼上&#10;&#10;第1行: 1-2組老師&#10;第2行: 3-4組老師&#10;第3行: 5-6組老師"></textarea></div>
                </div>
                <div style="text-align:center;margin-top:15px;"><button class="save-btn" onclick="saveEdit('1B')">💾 儲存</button></div>
            </div>
        </div>
        
        <!-- 1C -->
        <div class="class-section">
            <div class="class-header">
                <h3>📖 1C (31人)</h3>
                <button class="edit-btn" onclick="toggleEdit('1C')">🖊️ 編輯</button>
            </div>
            <div class="view-mode" id="view-1C">
                <table class="class-table">
                    <tr><th>組別</th><th>同學名單</th><th>負責老師</th></tr>
                    <tr><td>1</td><td class="student-cell" data-group="1C-1">待更新</td><td class="teacher-cell" data-group="1C-1-2" rowspan="2">待更新</td></tr>
                    <tr><td>2</td><td class="student-cell" data-group="1C-2"></td></tr>
                    <tr><td>3</td><td class="student-cell" data-group="1C-3"></td><td class="teacher-cell" data-group="1C-3-4" rowspan="2">待更新</td></tr>
                    <tr><td>4</td><td class="student-cell" data-group="1C-4"></td></tr>
                    <tr><td>5</td><td class="student-cell" data-group="1C-5"></td><td class="teacher-cell" data-group="1C-5-6" rowspan="2">待更新</td></tr>
                    <tr><td>6</td><td class="student-cell" data-group="1C-6"></td></tr>
                </table>
            </div>
            <div class="edit-mode" id="edit-1C">
                <div class="edit-container">
                    <div class="edit-col"><h4>👨‍🎓 學生名單</h4><textarea id="students-1C" placeholder="可由Excel貼上&#10;&#10;第1行: 第1組同學&#10;第2行: 第2組同學&#10;第3行: 第3組同學&#10;第4行: 第4組同學&#10;第5行: 第5組同學&#10;第6行: 第6組同學"></textarea></div>
                    <div class="edit-col"><h4>👩‍🏫 負責老師</h4><textarea id="teachers-1C" placeholder="可由Excel貼上&#10;&#10;第1行: 1-2組老師&#10;第2行: 3-4組老師&#10;第3行: 5-6組老師"></textarea></div>
                </div>
                <div style="text-align:center;margin-top:15px;"><button class="save-btn" onclick="saveEdit('1C')">💾 儲存</button></div>

        </div>
        
        <!-- 1D -->
        <div class="class-section">
            <div class="class-header">
                <h3>📖 1D (32人)</h3>
                <button class="edit-btn" onclick="toggleEdit('1D')">🖊️ 編輯</button>
            </div>
            <div class="view-mode" id="view-1D">
                <table class="class-table">
                    <tr><th>組別</th><th>同學名單</th><th>負責老師</th></tr>
                    <tr><td>1</td><td class="student-cell" data-group="1D-1">待更新</td><td class="teacher-cell" data-group="1D-1-2" rowspan="2">待更新</td></tr>
                    <tr><td>2</td><td class="student-cell" data-group="1D-2"></td></tr>
                    <tr><td>3</td><td class="student-cell" data-group="1D-3"></td><td class="teacher-cell" data-group="1D-3-4" rowspan="2">待更新</td></tr>
                    <tr><td>4</td><td class="student-cell" data-group="1D-4"></td></tr>
                    <tr><td>5</td><td class="student-cell" data-group="1D-5"></td><td class="teacher-cell" data-group="1D-5-6" rowspan="2">待更新</td></tr>
                    <tr><td>6</td><td class="student-cell" data-group="1D-6"></td></tr>
                </table>
            </div>
            <div class="edit-mode" id="edit-1D">
                <div class="edit-container">
                    <div class="edit-col"><h4>👨‍🎓 學生名單</h4><textarea id="students-1D" placeholder="可由Excel貼上&#10;&#10;第1行: 第1組同學&#10;第2行: 第2組同學&#10;第3行: 第3組同學&#10;第4行: 第4組同學&#10;第5行: 第5組同學&#10;第6行: 第6組同學"></textarea></div>
                    <div class="edit-col"><h4>👩‍🏫 負責老師</h4><textarea id="teachers-1D" placeholder="可由Excel貼上&#10;&#10;第1行: 1-2組老師&#10;第2行: 3-4組老師&#10;第3行: 5-6組老師"></textarea></div>
                </div>
                <div style="text-align:center;margin-top:15px;"><button class="save-btn" onclick="saveEdit('1D')">💾 儲存</button></div>
            </div>
        </div>
    </div>
    
    <script>
        function loadData() {
            ['1A','1B','1C','1D'].forEach(cls => {
                const s = localStorage.getItem('students-'+cls);
                const t = localStorage.getItem('teachers-'+cls);
                if(s){ document.getElementById('students-'+cls).value=s; parseAndDisplay(cls,s,t); }
            });
        }
        function parseAndDisplay(cls, st, tt) {
            const sl = st.split('\n');
            for(let i=0;i<6 && i<sl.length;i++) {
                const c = document.querySelector('.student-cell[data-group="'+cls+'-'+(i+1)+'"]');
                if(c && sl[i].trim()) c.textContent = sl[i].trim();
            }
            const tl = tt ? tt.split('\n') : [];
            ['1-2','3-4','5-6'].forEach((p,i) => {
                const c = document.querySelector('.teacher-cell[data-group="'+cls+'-'+p+'"]');
                if(c && tl[i] && tl[i].trim()) c.textContent = tl[i].trim();
            });
        }
        function toggleEdit(cls) {
            document.getElementById('edit-'+cls).classList.toggle('active');
            document.getElementById('view-'+cls).classList.toggle('hidden');
        }
        function saveEdit(cls) {
            const s = document.getElementById('students-'+cls).value;
            const t = document.getElementById('teachers-'+cls).value;
            localStorage.setItem('students-'+cls, s);
            localStorage.setItem('teachers-'+cls, t);
            parseAndDisplay(cls, s, t);
            toggleEdit(cls);
            alert('✅ 已儲存'+cls+'班分組資料！');
        }
        window.onload = loadData;
    </script>
</body>
</html>

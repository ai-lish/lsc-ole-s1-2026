<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 全方位學習日 2026 - 靈風中學</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #F39C12;
            --success: #2ECC71;
            --danger: #E74C3C;
            --dark: #2C3E50;
            --light: #ECF0F1;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
        }
        
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, #00D2FF 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .hero .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .section h2 {
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
        }
        
        .info-item h4 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .info-item p {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--dark);
        }
        
        .grade-list {
            list-style: none;
        }
        
        .grade-item {
            background: #f8f9fa;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .grade-icon {
            font-size: 1.5rem;
        }
        
        .coming-soon {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .coming-soon .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        footer {
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 50px;
        }
        
        .update-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🎓 全方位學習日 2026</h1>
        <p class="subtitle">靈風中學 | 多元體驗 · 探索學習</p>
    </div>
    
    <div class="container">
        <div class="update-note">
            📝 逐步更新中... 请继续补充细节！
        </div>
        
        <div class="section">
            <h2>📅 基本資料</h2>
            <div class="info-grid">
                <div class="info-item">
                    <h4>日期</h4>
                    <p>待定</p>
                </div>
                <div class="info-item">
                    <h4>對象</h4>
                    <p>中一至中六</p>
                </div>
                <div class="info-item">
                    <h4>地點</h4>
                    <p>待定</p>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>📋 年級活動</h2>
            <ul class="grade-list">
                <li class="grade-item">
                    <span class="grade-icon">📚</span>
                    <span>中一：待定</span>
                </li>
                <li class="grade-item">
                    <span class="grade-icon">🔬</span>
                    <span>中二：待定</span>
                </li>
                <li class="grade-item">
                    <span class="grade-icon">🏭</span>
                    <span>中三：待定</span>
                </li>
                <li class="grade-item">
                    <span class="grade-icon">🌿</span>
                    <span>中四：待定</span>
                </li>
                <li class="grade-item">
                    <span class="grade-icon">🏛️</span>
                    <span>中五：待定</span>
                </li>
                <li class="grade-item">
                    <span class="grade-icon">🎯</span>
                    <span>中六：待定</span>
                </li>
            </ul>
        </div>
        
        <div class="section">
            <h2>📝 備註</h2>
            <p style="color: #666; line-height: 1.8;">
                此網頁正在逐步更新中。<br>
                請繼續補充活動細節！
            </p>
        </div>
    </div>
    
    <footer>
        <p>🎓 靈風中學 全方位學習日 2026</p>
        <p class="credit">Made with 💙 by AI Assistant</p>
    </footer>
</body>
</html>

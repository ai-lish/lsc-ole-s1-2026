<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老师版登入 - 全方位学习日 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --dark: #2C3E50;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        
        .login-box h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        
        .login-box p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .login-box input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            font-family: inherit;
        }
        
        .login-box button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .login-box button:hover {
            background: #357ABD;
        }
        
        .error {
            color: red;
            margin-top: 15px;
            display: none;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--primary);
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 老师版登入</h1>
        <p>全方位学习日 2026 - 灵风中学</p>
        
        <input type="password" id="password" placeholder="请输入密码" onkeypress="handleEnter(event)">
        <button onclick="checkPassword()">登入</button>
        
        <p class="error" id="errorMsg">密码错误，请重试</p>
        
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>

<script>
const correctPassword = "lsc2026";

function handleEnter(event) {
    if (event.key === 'Enter') {
        checkPassword();
    }
}

function checkPassword() {
    const input = document.getElementById('password').value;
    if (input === correctPassword) {
        window.location.href = 'teacher-home.html';
    } else {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('password').value = '';
    }
}
</script>
</body>
</html>

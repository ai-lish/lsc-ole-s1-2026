<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全方位學習日 - 老師版 | 靈風中學</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4A90E2; --dark: #2C3E50; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .login-box h1 { color: var(--primary); margin-bottom: 10px; }
        .login-box p { color: #666; margin-bottom: 30px; }
        .login-box input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
        }
        .login-box button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .error { color: red; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-box" id="loginPage">
        <h1>🔐 老師登入</h1>
        <p>全方位學習日 2026</p>
        <input type="password" id="password" placeholder="請輸入密碼">
        <button onclick="checkPassword()">登入</button>
        <p class="error" id="errorMsg">密碼錯誤，請重試</p>
        <p style="margin-top:20px;"><a href="index.html">👈 返回學生版</a></p>
    </div>

<script>
const correctPassword = "lsc2026";

function checkPassword() {
    const input = document.getElementById('password').value;
    if (input === correctPassword) {
        window.location.href = 'teacher_full.html';
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}
</script>
</body>
</html>
